<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="60%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111822"/>
    </linearGradient>
    <linearGradient id="laserGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#skyGrad)"/>

  <!-- Ground plane -->
  <rect x="0" y="440" width="1200" height="160" fill="#0d1018" opacity="0.8"/>
  <line x1="0" y1="440" x2="1200" y2="440" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Perspective grid on ground -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="0.5">
    <line x1="200" y1="440" x2="0" y2="600"/>
    <line x1="300" y1="440" x2="100" y2="600"/>
    <line x1="400" y1="440" x2="250" y2="600"/>
    <line x1="500" y1="440" x2="400" y2="600"/>
    <line x1="600" y1="440" x2="550" y2="600"/>
    <line x1="700" y1="440" x2="700" y2="600"/>
    <line x1="800" y1="440" x2="850" y2="600"/>
    <line x1="900" y1="440" x2="1000" y2="600"/>
    <line x1="1000" y1="440" x2="1150" y2="600"/>
    <!-- Horizontal perspective lines -->
    <line x1="0" y1="470" x2="1200" y2="470"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- Background grid overlay -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="440"/>
    <line x1="400" y1="0" x2="400" y2="440"/>
    <line x1="600" y1="0" x2="600" y2="440"/>
    <line x1="800" y1="0" x2="800" y2="440"/>
    <line x1="1000" y1="0" x2="1000" y2="440"/>
  </g>

  <!-- Wind turbine silhouette (distance) -->
  <g transform="translate(920, 140)">
    <!-- Tower -->
    <polygon points="-6,300 6,300 4,0 -4,0" fill="#1a2030" stroke="#2a3a4a" stroke-width="0.5"/>
    <!-- Nacelle -->
    <rect x="-8" y="-8" width="22" height="14" rx="2" fill="#1a2030" stroke="#2a3a4a" stroke-width="0.5"/>
    <!-- Blades -->
    <g fill="#1a2030" stroke="#2a3a4a" stroke-width="0.5">
      <!-- Blade 1 (up) -->
      <polygon points="-2,-8 2,-8 4,-130 0,-135 -3,-130"/>
      <!-- Blade 2 (lower-right) -->
      <polygon points="6,2 8,-2 115,55 113,62 108,60"/>
      <!-- Blade 3 (lower-left) -->
      <polygon points="-6,2 -8,-2 -115,55 -113,62 -108,60"/>
    </g>
    <!-- Hub -->
    <circle cx="0" cy="0" r="6" fill="#1a2030" stroke="#2a3a4a" stroke-width="1"/>
  </g>

  <!-- Turbine measurement markers -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Rotor swept area indicator -->
    <ellipse cx="920" cy="140" rx="138" ry="138" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8" opacity="0.3"/>
    <!-- Hub crosshair -->
    <line x1="910" y1="140" x2="930" y2="140" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="920" y1="130" x2="920" y2="150" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <!-- Corner brackets on turbine -->
    <polyline points="800,20 800,10 810,10" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <polyline points="1040,20 1040,10 1030,10" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <polyline points="800,280 800,290 810,290" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <polyline points="1040,280 1040,290 1030,290" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- LiDAR/Laser system on tripod (foreground) -->
  <g transform="translate(180, 380)">
    <!-- Tripod legs -->
    <line x1="0" y1="0" x2="-40" y2="60" stroke="#3a4a5a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="40" y2="60" stroke="#3a4a5a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="5" y2="62" stroke="#3a4a5a" stroke-width="3" stroke-linecap="round"/>
    <!-- Tripod head -->
    <rect x="-12" y="-8" width="24" height="12" rx="2" fill="#2a3040" stroke="#4a5a6a" stroke-width="1"/>
    <!-- Laser unit body -->
    <rect x="-20" y="-30" width="40" height="24" rx="3" fill="#1a2535" stroke="#4a5a6a" stroke-width="1"/>
    <!-- Lens -->
    <circle cx="20" cy="-18" r="8" fill="#0d1520" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
    <circle cx="20" cy="-18" r="4" fill="#00d4ff" opacity="0.3"/>
    <!-- Display panel -->
    <rect x="-16" y="-28" width="28" height="10" rx="1" fill="#001a2a" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
    <!-- Small indicator lights -->
    <circle cx="-14" cy="-14" r="1.5" fill="#00ff88" opacity="0.8"/>
    <circle cx="-8" cy="-14" r="1.5" fill="#00d4ff" opacity="0.8"/>
  </g>

  <!-- Laser beam -->
  <line x1="208" y1="362" x2="920" y2="140" stroke="url(#laserGrad)" stroke-width="2" filter="url(#glowStrong)"/>
  <!-- Laser beam scatter dots -->
  <g fill="#00d4ff" opacity="0.4">
    <circle cx="400" cy="310" r="1"/>
    <circle cx="500" cy="286" r="0.8"/>
    <circle cx="600" cy="262" r="1.2"/>
    <circle cx="700" cy="238" r="0.8"/>
    <circle cx="800" cy="214" r="1"/>
    <circle cx="850" cy="202" r="0.6"/>
  </g>

  <!-- Distance measurement annotation -->
  <g filter="url(#glow)">
    <line x1="250" y1="395" x2="880" y2="395" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.4"/>
    <line x1="250" y1="390" x2="250" y2="400" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="880" y1="390" x2="880" y2="400" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <text x="565" y="412" fill="#00d4ff" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.7">≈ 200 m</text>
  </g>

  <!-- HUD overlay elements -->
  <g filter="url(#glow)">
    <!-- Top-left data panel -->
    <rect x="20" y="15" width="200" height="90" rx="2" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <text x="30" y="35" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.8">SYSTEM: ALIDA LiDAR v2.1</text>
    <text x="30" y="50" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.6">RANGE: 198.4 m</text>
    <text x="30" y="65" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.6">ELEV: +12.3°</text>
    <text x="30" y="80" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.6">AZI: 042.7°</text>
    <text x="30" y="95" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.6">WIND: 8.2 m/s @ 245°</text>

    <!-- Top-right status -->
    <rect x="980" y="15" width="200" height="75" rx="2" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <text x="990" y="35" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.8">TARGET: WTG-07</text>
    <text x="990" y="50" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.6">ROTOR Ø: 126 m</text>
    <text x="990" y="65" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.6">RPM: 12.4</text>
    <text x="990" y="80" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.6">STATUS: ● TRACKING</text>
    <circle cx="1038" cy="76" r="3" fill="#00ff88" opacity="0.7"/>

    <!-- Bottom data bar -->
    <rect x="20" y="555" width="1160" height="30" rx="2" fill="#0a0a0f" fill-opacity="0.8" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <text x="35" y="575" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.5">2024-01-15 14:32:07 UTC</text>
    <text x="350" y="575" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.5">LAT 54.0321°N</text>
    <text x="520" y="575" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.5">LON 7.8912°E</text>
    <text x="700" y="575" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.5">SAMPLES: 14,208</text>
    <text x="900" y="575" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.5">SCAN RATE: 400 Hz</text>
  </g>

  <!-- Scan pattern indicators near turbine -->
  <g opacity="0.25" stroke="#00d4ff" stroke-width="0.5" fill="none" filter="url(#glow)">
    <circle cx="920" cy="140" r="20"/>
    <circle cx="920" cy="140" r="40"/>
    <circle cx="920" cy="140" r="60"/>
  </g>

  <!-- Stars / atmospheric particles -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="100" cy="50" r="0.8"/>
    <circle cx="350" cy="80" r="0.6"/>
    <circle cx="500" cy="30" r="0.7"/>
    <circle cx="650" cy="95" r="0.5"/>
    <circle cx="750" cy="45" r="0.9"/>
    <circle cx="1100" cy="60" r="0.6"/>
    <circle cx="1050" cy="120" r="0.5"/>
    <circle cx="300" cy="150" r="0.4"/>
    <circle cx="450" cy="180" r="0.6"/>
  </g>

  <!-- Horizon glow -->
  <rect x="0" y="420" width="1200" height="40" fill="#0d1a2a" opacity="0.3"/>
</svg>
