<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="radarFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="radarStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#161620" rx="12"/>
  <!-- Grid rings -->
  <circle cx="200" cy="200" r="150" stroke="#2a2a3a" stroke-width="0.5" fill="none"/>
  <circle cx="200" cy="200" r="120" stroke="#2a2a3a" stroke-width="0.5" fill="none"/>
  <circle cx="200" cy="200" r="90" stroke="#2a2a3a" stroke-width="0.5" fill="none"/>
  <circle cx="200" cy="200" r="60" stroke="#2a2a3a" stroke-width="0.5" fill="none"/>
  <circle cx="200" cy="200" r="30" stroke="#2a2a3a" stroke-width="0.5" fill="none"/>
  <!-- Axis lines -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#2a2a3a" stroke-width="0.5"/>
  <line x1="50" y1="200" x2="350" y2="200" stroke="#2a2a3a" stroke-width="0.5"/>
  <line x1="94" y1="94" x2="306" y2="306" stroke="#2a2a3a" stroke-width="0.5"/>
  <line x1="306" y1="94" x2="94" y2="306" stroke="#2a2a3a" stroke-width="0.5"/>
  <!-- Data polygon 1 -->
  <polygon points="200,80 290,140 310,230 250,310 130,290 90,180"
    fill="url(#radarFill)" stroke="url(#radarStroke)" stroke-width="2"/>
  <!-- Data polygon 2 (inner) -->
  <polygon points="200,110 260,155 275,225 235,280 150,265 115,190"
    fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- Data points -->
  <circle cx="200" cy="80" r="4" fill="#00d4ff"/>
  <circle cx="290" cy="140" r="4" fill="#00d4ff"/>
  <circle cx="310" cy="230" r="4" fill="#00d4ff"/>
  <circle cx="250" cy="310" r="4" fill="#00d4ff"/>
  <circle cx="130" cy="290" r="4" fill="#00d4ff"/>
  <circle cx="90" cy="180" r="4" fill="#00d4ff"/>
  <!-- Axis labels -->
  <text x="200" y="40" text-anchor="middle" fill="#8a8a9a" font-size="11" font-family="monospace">1P Frequency</text>
  <text x="355" y="200" text-anchor="start" fill="#8a8a9a" font-size="11" font-family="monospace">Amplitude</text>
  <text x="200" y="380" text-anchor="middle" fill="#8a8a9a" font-size="11" font-family="monospace">Phase Angle</text>
  <text x="45" y="200" text-anchor="end" fill="#8a8a9a" font-size="11" font-family="monospace">Deflection</text>
  <text x="315" y="85" text-anchor="start" fill="#8a8a9a" font-size="11" font-family="monospace">Torsion</text>
  <text x="85" y="85" text-anchor="end" fill="#8a8a9a" font-size="11" font-family="monospace">Vibration</text>
  <!-- Center marker -->
  <circle cx="200" cy="200" r="3" fill="#00d4ff" opacity="0.8"/>
  <!-- Legend -->
  <rect x="20" y="350" width="12" height="3" fill="#00d4ff" rx="1"/>
  <text x="38" y="354" fill="#8a8a9a" font-size="9" font-family="monospace">Measured</text>
  <rect x="100" y="350" width="12" height="3" fill="#00d4ff" opacity="0.5" rx="1" stroke-dasharray="2,2"/>
  <text x="118" y="354" fill="#8a8a9a" font-size="9" font-family="monospace">Baseline</text>
</svg>
