<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="40" y="40" width="720" height="520" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Screen border -->
  <rect x="40" y="40" width="720" height="520" rx="4" fill="none" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Grid -->
  <g clip-path="url(#screenClip)" opacity="0.08" stroke="#00d4ff" stroke-width="0.5">
    <!-- Vertical grid -->
    <line x1="100" y1="40" x2="100" y2="560"/>
    <line x1="160" y1="40" x2="160" y2="560"/>
    <line x1="220" y1="40" x2="220" y2="560"/>
    <line x1="280" y1="40" x2="280" y2="560"/>
    <line x1="340" y1="40" x2="340" y2="560"/>
    <line x1="400" y1="40" x2="400" y2="560"/>
    <line x1="460" y1="40" x2="460" y2="560"/>
    <line x1="520" y1="40" x2="520" y2="560"/>
    <line x1="580" y1="40" x2="580" y2="560"/>
    <line x1="640" y1="40" x2="640" y2="560"/>
    <line x1="700" y1="40" x2="700" y2="560"/>
    <!-- Horizontal grid -->
    <line x1="40" y1="100" x2="760" y2="100"/>
    <line x1="40" y1="160" x2="760" y2="160"/>
    <line x1="40" y1="220" x2="760" y2="220"/>
    <line x1="40" y1="280" x2="760" y2="280"/>
    <line x1="40" y1="340" x2="760" y2="340"/>
    <line x1="40" y1="400" x2="760" y2="400"/>
    <line x1="40" y1="460" x2="760" y2="460"/>
    <line x1="40" y1="520" x2="760" y2="520"/>
  </g>

  <!-- Center crosshair axes -->
  <g stroke="#1a3a5a" stroke-width="0.8">
    <line x1="400" y1="60" x2="400" y2="540"/>
    <line x1="60" y1="300" x2="740" y2="300"/>
  </g>

  <!-- Rotor circle (true circle) -->
  <circle cx="400" cy="300" r="200" fill="none" stroke="#2a4a6a" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>

  <!-- Elliptical tracking overlay (the observed ellipse due to yaw/tilt) -->
  <ellipse cx="408" cy="295" rx="195" ry="180" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7" filter="url(#glow2)" transform="rotate(-5, 408, 295)"/>

  <!-- Second ellipse overlay (previous measurement) -->
  <ellipse cx="405" cy="298" rx="192" ry="176" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,6" transform="rotate(-4, 405, 298)"/>

  <!-- Rotor blades -->
  <g stroke="#5a7a9a" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <!-- Blade A (up-left) -->
    <line x1="400" y1="300" x2="400" y2="100"/>
    <!-- Blade B (lower-right) -->
    <line x1="400" y1="300" x2="573" y2="400"/>
    <!-- Blade C (lower-left) -->
    <line x1="400" y1="300" x2="227" y2="400"/>
  </g>

  <!-- Blade tip markers -->
  <g filter="url(#glow2)">
    <circle cx="400" cy="100" r="5" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="400" cy="100" r="2" fill="#00d4ff" opacity="0.6"/>
    <text x="412" y="95" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.7">A</text>

    <circle cx="573" cy="400" r="5" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="573" cy="400" r="2" fill="#00d4ff" opacity="0.6"/>
    <text x="585" y="405" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.7">B</text>

    <circle cx="227" cy="400" r="5" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="227" cy="400" r="2" fill="#00d4ff" opacity="0.6"/>
    <text x="210" y="415" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.7">C</text>
  </g>

  <!-- Hub center -->
  <circle cx="400" cy="300" r="12" fill="#0d1520" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <circle cx="400" cy="300" r="3" fill="#00d4ff" opacity="0.5"/>
  <!-- Center offset indicator -->
  <circle cx="408" cy="295" r="4" fill="none" stroke="#ff6644" stroke-width="1" opacity="0.7"/>
  <line x1="400" y1="300" x2="408" y2="295" stroke="#ff6644" stroke-width="0.8" opacity="0.5" stroke-dasharray="2,2"/>

  <!-- Phase angle indicators -->
  <g filter="url(#glow2)" opacity="0.5">
    <!-- 0° marker -->
    <line x1="400" y1="95" x2="400" y2="85" stroke="#00d4ff" stroke-width="1"/>
    <text x="400" y="78" fill="#00d4ff" font-family="monospace" font-size="9" text-anchor="middle">0°</text>
    <!-- 90° marker -->
    <line x1="605" y1="300" x2="615" y2="300" stroke="#00d4ff" stroke-width="1"/>
    <text x="630" y="304" fill="#00d4ff" font-family="monospace" font-size="9" text-anchor="middle">90°</text>
    <!-- 180° marker -->
    <line x1="400" y1="505" x2="400" y2="515" stroke="#00d4ff" stroke-width="1"/>
    <text x="400" y="528" fill="#00d4ff" font-family="monospace" font-size="9" text-anchor="middle">180°</text>
    <!-- 270° marker -->
    <line x1="195" y1="300" x2="185" y2="300" stroke="#00d4ff" stroke-width="1"/>
    <text x="170" y="304" fill="#00d4ff" font-family="monospace" font-size="9" text-anchor="middle">270°</text>
  </g>

  <!-- Intermediate angle ticks -->
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.25">
    <!-- 30° increments on the circle -->
    <line x1="500" y1="127" x2="505" y2="123"/>
    <line x1="573" y1="200" x2="578" y2="197"/>
    <line x1="573" y1="400" x2="578" y2="403"/>
    <line x1="500" y1="473" x2="505" y2="477"/>
    <line x1="300" y1="473" x2="295" y2="477"/>
    <line x1="227" y1="400" x2="222" y2="403"/>
    <line x1="227" y1="200" x2="222" y2="197"/>
    <line x1="300" y1="127" x2="295" y2="123"/>
  </g>

  <!-- Yaw angle arc -->
  <g filter="url(#glow2)" opacity="0.6">
    <path d="M 400 260 A 40 40 0 0 1 437 275" fill="none" stroke="#ff9944" stroke-width="1"/>
    <text x="442" y="265" fill="#ff9944" font-family="monospace" font-size="9" opacity="0.8">γ = 5.2°</text>
  </g>

  <!-- Tilt angle indicator -->
  <g filter="url(#glow2)" opacity="0.6">
    <path d="M 360 300 A 40 40 0 0 1 367 268" fill="none" stroke="#44ff88" stroke-width="1"/>
    <text x="335" y="262" fill="#44ff88" font-family="monospace" font-size="9" opacity="0.8">δ = 3.1°</text>
  </g>

  <!-- Semi-major / semi-minor axis lines of ellipse -->
  <g stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3">
    <line x1="213" y1="295" x2="603" y2="295" transform="rotate(-5, 408, 295)"/>
    <line x1="408" y1="115" x2="408" y2="475" transform="rotate(-5, 408, 295)"/>
  </g>

  <!-- Axis dimension labels -->
  <g filter="url(#glow2)">
    <text x="610" y="285" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.5" transform="rotate(-5, 610, 285)">a = 195 px</text>
    <text x="415" y="125" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.5" transform="rotate(-5, 415, 125)">b = 180 px</text>
  </g>

  <!-- Tracking point scatter (simulated blade tip detections) -->
  <g fill="#00d4ff" opacity="0.3">
    <circle cx="401" cy="101" r="1.5"/>
    <circle cx="399" cy="98" r="1"/>
    <circle cx="403" cy="103" r="1.2"/>
    <circle cx="397" cy="99" r="0.8"/>
    <circle cx="574" cy="401" r="1.5"/>
    <circle cx="571" cy="398" r="1"/>
    <circle cx="576" cy="403" r="1.2"/>
    <circle cx="228" cy="401" r="1.5"/>
    <circle cx="225" cy="398" r="1"/>
    <circle cx="230" cy="403" r="1.2"/>
    <circle cx="226" cy="397" r="0.8"/>
  </g>

  <!-- Top-left data panel -->
  <g filter="url(#glow2)">
    <rect x="50" y="50" width="180" height="105" rx="2" fill="#0a0a0f" fill-opacity="0.85" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
    <text x="60" y="68" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.9">ELLIPSE ANALYSIS</text>
    <text x="60" y="83" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.6">Eccentricity: 0.382</text>
    <text x="60" y="96" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.6">Center Δx: +8.0 px</text>
    <text x="60" y="109" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.6">Center Δy: -5.0 px</text>
    <text x="60" y="122" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.6">Rotation:  -5.0°</text>
    <text x="60" y="145" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.6">Fit R²: 0.9974</text>
  </g>

  <!-- Bottom-right info -->
  <g filter="url(#glow2)">
    <rect x="570" y="500" width="180" height="50" rx="2" fill="#0a0a0f" fill-opacity="0.85" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
    <text x="580" y="518" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.6">FRAME: 2847 / 3600</text>
    <text x="580" y="533" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.6">RPM: 12.4  |  f: 0.207 Hz</text>
    <text x="580" y="548" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.5">● LIVE TRACKING</text>
    <circle cx="586" cy="544" r="2.5" fill="#00ff88" opacity="0.6"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.3">
    <polyline points="45,45 45,55" fill="none"/>
    <polyline points="45,45 55,45" fill="none"/>
    <polyline points="755,45 755,55" fill="none"/>
    <polyline points="755,45 745,45" fill="none"/>
    <polyline points="45,555 45,545" fill="none"/>
    <polyline points="45,555 55,555" fill="none"/>
    <polyline points="755,555 755,545" fill="none"/>
    <polyline points="755,555 745,555" fill="none"/>
  </g>
</svg>
