<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="turbineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="transparent"/>
  <!-- Turbine silhouette -->
  <g transform="translate(400,200)" opacity="0.15">
    <!-- Tower -->
    <rect x="-8" y="20" width="16" height="160" fill="#00d4ff"/>
    <!-- Hub -->
    <circle cx="0" cy="20" r="12" fill="#00d4ff"/>
    <!-- Blade 1 (up) -->
    <path d="M0,20 L-6,-120 L0,-130 L6,-120 Z" fill="#00d4ff"/>
    <!-- Blade 2 (lower right) -->
    <path d="M0,20 L120,80 L125,88 L115,90 Z" fill="#00d4ff"/>
    <!-- Blade 3 (lower left) -->
    <path d="M0,20 L-120,80 L-125,88 L-115,90 Z" fill="#00d4ff"/>
  </g>
  <!-- Technical overlay lines -->
  <g filter="url(#glow)" opacity="0.6">
    <line x1="100" y1="100" x2="700" y2="100" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="100" y1="200" x2="700" y2="200" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="100" y1="300" x2="700" y2="300" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="200" y1="50" x2="200" y2="350" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="400" y1="50" x2="400" y2="350" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="600" y1="50" x2="600" y2="350" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8"/>
  </g>
  <!-- Measurement points -->
  <circle cx="250" cy="150" r="5" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="250" cy="150" r="12" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="120" r="5" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
  <circle cx="400" cy="120" r="12" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.4"/>
  <circle cx="550" cy="180" r="5" fill="none" stroke="#ff3366" stroke-width="1.5" opacity="0.8"/>
  <circle cx="550" cy="180" r="12" fill="none" stroke="#ff3366" stroke-width="0.5" opacity="0.4"/>
  <!-- Waveform line -->
  <path d="M100,250 Q150,230 200,250 T300,250 T400,240 T500,260 T600,245 T700,250"
    fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <path d="M100,270 Q150,260 200,275 T300,265 T400,280 T500,260 T600,275 T700,268"
    fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
</svg>
